<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis — Voice Productivity Assistant</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">J</div>
      <span class="logo-text">Jarvis</span>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item active" data-tab="dashboard" href="#dashboard">
        <span class="nav-icon">◉</span> Dashboard
      </a>
      <a class="nav-item" data-tab="tasks" href="#tasks">
        <span class="nav-icon">☑</span> Tasks
        <span class="badge" id="task-badge"></span>
      </a>
      <a class="nav-item" data-tab="notes" href="#notes">
        <span class="nav-icon">📄</span> Notes
        <span class="badge" id="note-badge"></span>
      </a>
      <a class="nav-item" data-tab="reminders" href="#reminders">
        <span class="nav-icon">⏰</span> Reminders
        <span class="badge" id="reminder-badge"></span>
      </a>
      <a class="nav-item" data-tab="memory" href="#memory">
        <span class="nav-icon">🧠</span> Memory
      </a>
      <a class="nav-item" data-tab="search" href="#search">
        <span class="nav-icon">🔍</span> Search
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Connected</span>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="menu-toggle" id="menu-toggle" aria-label="Toggle sidebar">☰</button>
      <h1 class="page-title" id="page-title">Dashboard</h1>
      <div class="topbar-actions">
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">🌙</button>
      </div>
    </header>

    <section class="content" id="content">
      <div class="tab-pane active" id="tab-dashboard">
        <div class="stats-grid" id="stats-grid">
          <div class="stat-card"><div class="stat-value" id="stat-tasks">0</div><div class="stat-label">Tasks</div></div>
          <div class="stat-card"><div class="stat-value" id="stat-pending">0</div><div class="stat-label">Pending</div></div>
          <div class="stat-card"><div class="stat-value" id="stat-notes">0</div><div class="stat-label">Notes</div></div>
          <div class="stat-card"><div class="stat-value" id="stat-memories">0</div><div class="stat-label">Memories</div></div>
        </div>
        <div class="activity-feed">
          <h2>Recent Activity</h2>
          <div id="recent-activity"><p class="muted">No recent activity. Start by using voice commands!</p></div>
        </div>
      </div>

      <div class="tab-pane" id="tab-tasks">
        <div class="pane-header">
          <button class="btn btn-primary" id="task-create-btn">+ New Task</button>
          <div class="filter-group">
            <select id="task-filter-status"><option value="">All</option><option value="pending">Pending</option><option value="completed">Completed</option></select>
          </div>
        </div>
        <div class="list" id="task-list"></div>
      </div>

      <div class="tab-pane" id="tab-notes">
        <div class="pane-header">
          <button class="btn btn-primary" id="note-create-btn">+ New Note</button>
        </div>
        <div class="list" id="note-list"></div>
      </div>

      <div class="tab-pane" id="tab-reminders">
        <div class="pane-header">
          <button class="btn btn-primary" id="reminder-create-btn">+ New Reminder</button>
        </div>
        <div class="list" id="reminder-list"></div>
      </div>

      <div class="tab-pane" id="tab-memory">
        <div class="pane-header">
          <p class="muted">Things Jarvis remembers about you</p>
        </div>
        <div class="list" id="memory-list"></div>
      </div>

      <div class="tab-pane" id="tab-search">
        <div class="search-bar">
          <input type="text" id="search-input" placeholder="Search tasks, notes, memories..." />
          <button class="btn btn-primary" id="search-btn">Search</button>
        </div>
        <div class="list" id="search-results"></div>
      </div>
    </section>

    <div class="command-bar">
      <div class="voice-indicator" id="voice-indicator"></div>
      <input type="text" id="command-input" placeholder="Type a command or press the mic to speak..." autofocus />
      <button class="mic-btn" id="mic-btn" aria-label="Voice input">🎤</button>
      <button class="send-btn" id="send-btn" aria-label="Send">➤</button>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 id="modal-title">Title</h3>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
